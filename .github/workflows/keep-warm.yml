name: Keep Duck Playground Warm

on:
  schedule:
    # Run every minute to allow for random intervals
    - cron: '* * * * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Random ping between 8-12 minutes
        run: |
          # Generate random number between 0-100
          RANDOM_NUM=$((RANDOM % 101))

          # Probability calculation: ~10% chance per minute = 8-12 min average
          # If RANDOM_NUM < 10, we ping (10% chance)
          if [ $RANDOM_NUM -lt 10 ]; then
            echo "Pinging health endpoint (random interval)"
            curl -s https://duck-playground.onrender.com/health
            echo ""
            echo "✅ Keep-alive ping sent at $(date)"
          else
            echo "⏭️  Skipping this minute (${RANDOM_NUM}% - next check soon)"
          fi
